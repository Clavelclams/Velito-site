<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <!-- Pattern violet zone -->
    <pattern id="motif-purple" x="0" y="0" width="100" height="115" patternUnits="userSpaceOnUse">
      <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.13"/>
      <line x1="50" y1="5" x2="50" y2="35" stroke="#7c3aed" stroke-width="0.3" opacity="0.06"/>
      <line x1="50" y1="65" x2="50" y2="95" stroke="#7c3aed" stroke-width="0.3" opacity="0.06"/>
      <circle cx="50" cy="5" r="1.5" fill="#7c3aed" opacity="0.12"/>
      <circle cx="90" cy="50" r="1" fill="#E63946" opacity="0.06"/>
    </pattern>

    <!-- Pattern rouge zone — quasi invisible -->
    <pattern id="motif-red" x="0" y="0" width="100" height="115" patternUnits="userSpaceOnUse">
      <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="none" stroke="rgba(230,57,70,0.04)" stroke-width="0.4"/>
    </pattern>

    <!-- Clips -->
    <clipPath id="clip-top">
      <polygon points="0,0 1920,0 1920,600 0,860"/>
    </clipPath>
    <clipPath id="clip-bottom">
      <polygon points="0,860 1920,600 1920,1080 0,1080"/>
    </clipPath>
  </defs>

  <!-- ZONE VIOLET (haut) -->
  <g clip-path="url(#clip-top)">
    <rect width="1920" height="1080" fill="#0d0618"/>
    <!-- Glow violet — discret -->
    <ellipse cx="400" cy="350" rx="300" ry="240" fill="#7c3aed" opacity="0.03"/>
    <!-- Pattern -->
    <rect width="1920" height="1080" fill="url(#motif-purple)"/>
    <!-- Cercles déco -->
    <circle cx="1620" cy="200" r="130" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.07"/>
    <circle cx="1620" cy="200" r="220" fill="none" stroke="#7c3aed" stroke-width="0.3" opacity="0.035"/>
    <!-- Crosshair -->
    <g transform="translate(280, 500)" opacity="0.04">
      <circle cx="0" cy="0" r="28" fill="none" stroke="#E63946" stroke-width="1.2"/>
      <line x1="-40" y1="0" x2="-16" y2="0" stroke="#E63946" stroke-width="1"/>
      <line x1="16" y1="0" x2="40" y2="0" stroke="#E63946" stroke-width="1"/>
      <line x1="0" y1="-40" x2="0" y2="-16" stroke="#E63946" stroke-width="1"/>
      <line x1="0" y1="16" x2="0" y2="40" stroke="#E63946" stroke-width="1"/>
    </g>
  </g>

  <!-- ZONE ROUGE (bas) — NOIR quasi identique, tint rouge minimal -->
  <g clip-path="url(#clip-bottom)">
    <!-- Même noir de base que la zone violette, teinté rouge -->
    <rect width="1920" height="1080" fill="#0e0510"/>
    <!-- Très léger tint rouge uniquement le long de la diagonale -->
    <ellipse cx="960" cy="700" rx="900" ry="100" fill="#E63946" opacity="0.025"/>
    <!-- Pattern quasi invisible -->
    <rect width="1920" height="1080" fill="url(#motif-red)"/>
    <!-- Cercle déco -->
    <circle cx="1550" cy="920" r="80" fill="none" stroke="rgba(230,57,70,0.04)" stroke-width="0.5"/>
  </g>

  <!-- LIGNE DE COUPE -->
  <line x1="0" y1="860" x2="1920" y2="600" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <line x1="0" y1="863" x2="1920" y2="603" stroke="#E63946" stroke-width="1.5" opacity="0.2"/>
  <!-- Ligne parallèle -->
  <line x1="0" y1="850" x2="1920" y2="590" stroke="rgba(124,58,237,0.04)" stroke-width="0.5"/>
</svg>
