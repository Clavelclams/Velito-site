<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="glow-red" cx="70%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#E63946" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="20%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Pattern hexagonal bien visible -->
    <pattern id="hex-grid" x="0" y="0" width="80" height="92" patternUnits="userSpaceOnUse">
      <polygon points="40,2 75,22 75,62 40,82 5,62 5,22" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.18"/>
      <!-- Noeud central -->
      <circle cx="40" cy="42" r="2.5" fill="#7c3aed" opacity="0.2"/>
      <!-- Lignes circuit -->
      <line x1="40" y1="2" x2="40" y2="30" stroke="#7c3aed" stroke-width="0.5" opacity="0.12"/>
      <line x1="40" y1="54" x2="40" y2="82" stroke="#7c3aed" stroke-width="0.5" opacity="0.12"/>
      <line x1="5" y1="42" x2="28" y2="42" stroke="#7c3aed" stroke-width="0.4" opacity="0.08"/>
      <line x1="52" y1="42" x2="75" y2="42" stroke="#7c3aed" stroke-width="0.4" opacity="0.08"/>
      <!-- Accent rouge sur certains noeuds -->
      <circle cx="40" cy="2" r="1.5" fill="#E63946" opacity="0.15"/>
      <circle cx="75" cy="42" r="1.5" fill="#E63946" opacity="0.1"/>
    </pattern>

    <!-- Grands motifs gaming dispersés -->
    <pattern id="gaming-icons" x="0" y="0" width="400" height="400" patternUnits="userSpaceOnUse">
      <!-- Crosshair -->
      <g transform="translate(100, 100)" opacity="0.08">
        <circle cx="0" cy="0" r="25" fill="none" stroke="#E63946" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="8" fill="none" stroke="#E63946" stroke-width="0.8"/>
        <line x1="-35" y1="0" x2="-15" y2="0" stroke="#E63946" stroke-width="1.2"/>
        <line x1="15" y1="0" x2="35" y2="0" stroke="#E63946" stroke-width="1.2"/>
        <line x1="0" y1="-35" x2="0" y2="-15" stroke="#E63946" stroke-width="1.2"/>
        <line x1="0" y1="15" x2="0" y2="35" stroke="#E63946" stroke-width="1.2"/>
      </g>
      <!-- D-Pad -->
      <g transform="translate(300, 280)" opacity="0.07">
        <rect x="-10" y="-30" width="20" height="60" rx="4" fill="#7c3aed"/>
        <rect x="-30" y="-10" width="60" height="20" rx="4" fill="#7c3aed"/>
      </g>
      <!-- Triangle play -->
      <g transform="translate(200, 350)" opacity="0.06">
        <polygon points="0,-20 18,10 -18,10" fill="none" stroke="#E63946" stroke-width="1.5"/>
      </g>
      <!-- Boutons ABXY -->
      <g transform="translate(350, 80)" opacity="0.06">
        <circle cx="0" cy="-15" r="8" fill="none" stroke="#7c3aed" stroke-width="1"/>
        <circle cx="15" cy="0" r="8" fill="none" stroke="#E63946" stroke-width="1"/>
        <circle cx="0" cy="15" r="8" fill="none" stroke="#7c3aed" stroke-width="1"/>
        <circle cx="-15" cy="0" r="8" fill="none" stroke="#E63946" stroke-width="1"/>
      </g>
    </pattern>
  </defs>

  <!-- Fond -->
  <rect width="1920" height="1080" fill="#0d0618"/>

  <!-- Glows -->
  <rect width="1920" height="1080" fill="url(#glow-red)"/>
  <rect width="1920" height="1080" fill="url(#glow-purple)"/>

  <!-- Pattern hexagonal -->
  <rect width="1920" height="1080" fill="url(#hex-grid)"/>

  <!-- Gaming icons overlay -->
  <rect width="1920" height="1080" fill="url(#gaming-icons)"/>

  <!-- Grille subtile -->
  <g opacity="0.05" stroke="#7c3aed" stroke-width="0.5">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
  </g>

  <!-- Diagonale accent rouge subtile en bas -->
  <polygon points="1920,800 1920,1080 1400,1080" fill="#E63946" opacity="0.06"/>
  <line x1="1400" y1="1080" x2="1920" y2="800" stroke="#E63946" stroke-width="1.5" opacity="0.12"/>

  <!-- Grands cercles décor -->
  <circle cx="1600" cy="250" r="180" fill="none" stroke="#E63946" stroke-width="0.8" opacity="0.08"/>
  <circle cx="1600" cy="250" r="250" fill="none" stroke="#E63946" stroke-width="0.4" opacity="0.04"/>
  <circle cx="250" cy="850" r="140" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.08"/>
  <circle cx="250" cy="850" r="200" fill="none" stroke="#7c3aed" stroke-width="0.4" opacity="0.04"/>
</svg>
